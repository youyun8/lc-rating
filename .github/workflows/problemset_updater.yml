name: Upstream Data Sync

on:
  schedule:
    - cron: "10 4 * * 1" # 每週一 UTC 時間 04:10 / Beijing 時間 12:10 執行
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd apps/web/lc-maker
          pip install -r requirements.txt

      - name: Sync from upstream and translate to Traditional Chinese
        run: |
          cd apps/web/lc-maker
          python sync_upstream.py

      - name: Commit changes
        run: |
          git add .
          git diff-index --quiet HEAD || git commit -m "Update public data🎈"

      - name: Push changes
        if: success()
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
