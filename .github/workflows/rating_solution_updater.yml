name: Rating Solution Updater

on:
  schedule:
    - cron: "0 5 * * 1" # 每週一 UTC 時間 05:00 / Beijing 時間 13:00 執行
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rating-solution-updater:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd apps/web/lc-maker
          pip install -r requirements.txt

      - name: Fetch latest solutions and ratings
        run: |
          cd apps/web/lc-maker
          python fetch_data.py --latest --scope solutions --out ../public/problemset

      - name: Translate to Traditional Chinese
        run: |
          cd apps/web/lc-maker
          python translate_to_traditional.py

      - name: Commit changes
        run: |
          git add .
          git diff-index --quiet HEAD || git commit -m "Update solutions🎈"

      - name: Push changes
        if: success()
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
