name: StudyPlan Updater

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-studyplan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install updater dependencies
        working-directory: ./apps/web/lc-maker
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Merge upstream study-plan updates
        working-directory: ./apps/web/lc-maker
        run: python merge_upstream_to_local.py

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add apps/web/public/studyplan
          if git diff --cached --quiet; then
            echo "No study-plan changes to commit"
            exit 0
          fi

          branch="${GITHUB_REF_NAME:-main}"
          git commit -m "Update problem list"
          git push origin HEAD:"${branch}"
