name: Upstream Data Sync

on:
  schedule:
    - cron: "10 4 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install updater dependencies
        working-directory: ./apps/web/lc-maker
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Sync upstream problemset data
        working-directory: ./apps/web/lc-maker
        run: python sync_upstream.py

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add apps/web/public/problemset
          if git diff --cached --quiet; then
            echo "No problemset changes to commit"
            exit 0
          fi

          branch="${GITHUB_REF_NAME:-main}"
          git commit -m "Update public data🎈"
          git push origin HEAD:"${branch}"
